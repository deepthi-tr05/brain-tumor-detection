<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – NeuroScan AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root[data-theme="dark"] {
            --primary:#00e5ff; --primary-dark:#0066ff; --accent:#00b4d8;
            --bg-deep:#020b18; --bg-card:rgba(0,180,216,0.045);
            --border:rgba(0,229,255,0.12); --text:#cce8ff; --text-muted:rgba(180,220,255,0.55);
        }
        :root[data-theme="light"] {
            --primary:#0066ff; --primary-dark:#0040cc; --accent:#00b4d8;
            --bg-deep:#e8f4fd; --bg-card:rgba(255,255,255,0.88);
            --border:rgba(0,102,255,0.15); --text:#0a1628; --text-muted:rgba(10,22,40,0.58);
        }
        body{font-family:'Inter',sans-serif;background:var(--bg-deep);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:background 0.4s,color 0.4s;}

        .bg-scene{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;background:radial-gradient(ellipse at 10% 50%,rgba(0,150,199,0.12) 0%,transparent 50%),radial-gradient(ellipse at 90% 15%,rgba(0,102,255,0.1) 0%,transparent 45%),var(--bg-deep);}
        [data-theme="light"] .bg-scene{background:radial-gradient(ellipse at 10% 50%,rgba(0,102,255,0.07) 0%,transparent 50%),var(--bg-deep);}
        .orb{position:absolute;border-radius:50%;filter:blur(90px);animation:orbFloat 20s ease-in-out infinite;}
        .orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(0,150,199,0.28),rgba(0,102,255,0.12) 50%,transparent 70%);top:-200px;right:-150px;}
        .orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(0,229,255,0.22),rgba(0,150,199,0.08) 50%,transparent 70%);bottom:-100px;left:-100px;animation-delay:7s;}
        .orb-3{width:300px;height:300px;background:radial-gradient(circle,rgba(0,64,204,0.18),transparent 70%);top:45%;left:55%;animation-delay:14s;}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}25%{transform:translate(26px,-24px) scale(1.04);}50%{transform:translate(-18px,18px) scale(0.97);}75%{transform:translate(12px,20px) scale(1.02);}}
        [data-theme="light"] .orb{opacity:0.2;}

        .hex-grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.35;background-image:linear-gradient(rgba(0,229,255,0.08) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.08) 1px,transparent 1px);background-size:44px 44px;animation:gridShift 30s linear infinite;}
        @keyframes gridShift{0%{background-position:0 0;}100%{background-position:44px 44px;}}
        [data-theme="light"] .hex-grid{opacity:0.12;}

        .scanline{position:fixed;left:0;right:0;height:1px;z-index:0;pointer-events:none;background:linear-gradient(90deg,transparent 0%,rgba(0,229,255,0.5) 25%,rgba(0,180,216,0.8) 50%,rgba(0,229,255,0.5) 75%,transparent 100%);animation:scanSweep 5s linear infinite;opacity:0.6;box-shadow:0 0 16px rgba(0,229,255,0.6),0 0 32px rgba(0,150,199,0.3);}
        @keyframes scanSweep{0%{top:-2%;opacity:0;}5%{opacity:0.6;}95%{opacity:0.6;}100%{top:102%;opacity:0;}}
        [data-theme="light"] .scanline{opacity:0.2;}

        .canvas-particles{position:fixed;inset:0;z-index:0;pointer-events:none;}

        .auth-wrapper{position:relative;z-index:10;width:100%;max-width:420px;padding:20px;}
        .brand{text-align:center;margin-bottom:28px;}
        .brand-icon{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;background:linear-gradient(135deg,#0066ff,#00e5ff);border-radius:18px;margin-bottom:14px;box-shadow:0 0 40px rgba(0,229,255,0.4),0 0 80px rgba(0,102,255,0.2);animation:iconPulse 3s ease-in-out infinite;}
        @keyframes iconPulse{0%,100%{box-shadow:0 0 40px rgba(0,229,255,0.4);}50%{box-shadow:0 0 60px rgba(0,229,255,0.6);}}
        .brand-icon i{font-size:28px;color:white;}
        .brand h1{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#cce8ff 20%,#00e5ff 100%);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .brand p{color:var(--text-muted);font-size:0.86rem;margin-top:5px;}

        .auth-card{background:var(--bg-card);backdrop-filter:blur(28px);border:1px solid var(--border);border-radius:26px;padding:36px;box-shadow:0 24px 80px rgba(0,0,0,0.5),inset 0 1px 0 rgba(0,229,255,0.1);animation:cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1);}
        @keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}

        .card-title{font-size:1.15rem;font-weight:700;color:var(--text);margin-bottom:4px;}
        .card-subtitle{font-size:0.83rem;color:var(--text-muted);margin-bottom:24px;line-height:1.6;}
        .alert{padding:12px 16px;border-radius:12px;font-size:0.85rem;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
        .alert-success{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);color:#00e676;}
        .alert-error{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);color:#ff6b7a;}

        .form-group{margin-bottom:20px;}
        .form-label{display:block;font-size:0.78rem;font-weight:600;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.07em;}
        .input-wrapper{position:relative;}
        .input-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.9rem;pointer-events:none;transition:color 0.3s;}
        .form-input{width:100%;padding:13px 42px 13px 42px;background:rgba(0,180,216,0.05);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:0.94rem;font-family:'Inter',sans-serif;outline:none;transition:all 0.3s;}
        .form-input::placeholder{color:rgba(180,220,255,0.25);}
        .form-input:focus{border-color:var(--primary);background:rgba(0,229,255,0.07);box-shadow:0 0 0 3px rgba(0,229,255,0.12);}
        .input-wrapper:focus-within .input-icon{color:var(--primary);}
        .pw-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.88rem;transition:color 0.3s;padding:4px;}
        .pw-toggle:hover{color:var(--primary);}

        .strength-row{margin-top:8px;display:flex;gap:4px;align-items:center;}
        .strength-seg{flex:1;height:3px;border-radius:2px;background:rgba(0,229,255,0.1);transition:background 0.4s;}
        .strength-label{font-size:0.74rem;color:var(--text-muted);min-width:48px;text-align:right;transition:color 0.3s;}

        .btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,#0066ff,#00b4d8);color:white;border:none;border-radius:12px;font-size:1rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:4px;position:relative;overflow:hidden;}
        .btn-primary::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transition:left 0.5s;}
        .btn-primary:hover::before{left:100%;}
        .btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,180,216,0.45);}
        .btn-primary:disabled{opacity:0.65;cursor:not-allowed;}

        .back-link{text-align:center;margin-top:20px;font-size:0.86rem;color:var(--text-muted);}
        .back-link a{color:var(--primary);font-weight:600;text-decoration:none;}
        .back-link a:hover{color:var(--accent);}

        .btn-loader{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.35);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}

        .error-page{text-align:center;padding:20px;}
        .error-icon{font-size:3rem;margin-bottom:16px;display:block;}
        .error-page p{color:var(--text-muted);font-size:0.9rem;margin-bottom:20px;}

        .theme-toggle-fab{position:fixed;top:18px;right:18px;z-index:999;width:44px;height:44px;border-radius:50%;background:rgba(0,180,216,0.08);border:1px solid var(--border);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;color:var(--text-muted);font-size:1rem;box-shadow:0 4px 16px rgba(0,0,0,0.3);}
        .theme-toggle-fab:hover{background:rgba(0,229,255,0.15);border-color:rgba(0,229,255,0.4);color:var(--primary);transform:rotate(20deg) scale(1.05);}

        [data-theme="light"] .auth-card{background:rgba(255,255,255,0.94);box-shadow:0 24px 80px rgba(0,102,255,0.12);}
        [data-theme="light"] .form-input{background:rgba(255,255,255,0.92);color:var(--text);}
        [data-theme="light"] .form-input::placeholder{color:rgba(10,22,40,0.3);}
        [data-theme="light"] .form-input:focus{background:rgba(0,102,255,0.04);}
        [data-theme="light"] .brand h1{background:linear-gradient(135deg,#0a1628,#0066ff);-webkit-background-clip:text;background-clip:text;}
        [data-theme="light"] .strength-seg{background:rgba(0,102,255,0.1);}
    </style>
</head>
<body>
<button class="theme-toggle-fab" id="themeToggle" title="Toggle light/dark mode" onclick="toggleTheme()">
    <i class="fas fa-moon" id="themeIcon"></i>
</button>
<div class="bg-scene"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<div class="hex-grid"></div>
<div class="scanline"></div>
<canvas class="canvas-particles" id="particlesCanvas"></canvas>

<div class="auth-wrapper">
    <div class="brand">
        <div class="brand-icon"><i class="fas fa-brain"></i></div>
        <h1>NeuroScan AI</h1>
        <p>Set a new password</p>
    </div>

    <div class="auth-card">
        {% if error %}
        <div class="error-page">
            <span class="error-icon">🔐</span>
            <div class="card-title" style="margin-bottom:10px;">Link Invalid or Expired</div>
            <p>{{ error }}</p>
            <a href="/forgot-password" style="color:var(--primary);font-weight:600;text-decoration:none;font-size:0.9rem;">
                <i class="fas fa-arrow-left"></i> Request a New Reset Link
            </a>
        </div>
        {% else %}
        <div class="card-title">Reset Password</div>
        <div class="card-subtitle">Enter a new strong password for your account.</div>

        <div class="alert alert-success" id="successMsg" style="display:none;">
            <i class="fas fa-check-circle"></i>
            Password reset successful! Redirecting to login…
        </div>
        <div class="alert alert-error" id="errorMsg" style="display:none;">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <form id="resetForm" onsubmit="doReset(event)">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <div class="input-wrapper">
                    <input type="password" id="newPassword" class="form-input" placeholder="Min. 6 characters" required oninput="updateStrength(this.value)">
                    <i class="fas fa-lock input-icon"></i>
                    <button type="button" class="pw-toggle" onclick="togglePw('newPassword',this)"><i class="fas fa-eye"></i></button>
                </div>
                <div class="strength-row">
                    <div class="strength-seg" id="s1"></div>
                    <div class="strength-seg" id="s2"></div>
                    <div class="strength-seg" id="s3"></div>
                    <div class="strength-seg" id="s4"></div>
                    <span class="strength-label" id="sLabel"></span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter password" required>
                    <i class="fas fa-lock input-icon"></i>
                    <button type="button" class="pw-toggle" onclick="togglePw('confirmPassword',this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">
                <div class="btn-loader" id="btnLoader"></div>
                <i class="fas fa-key" id="btnIcon"></i>
                <span id="btnText">Reset Password</span>
            </button>
        </form>

        <div class="back-link"><a href="/login"><i class="fas fa-arrow-left"></i> Back to Sign In</a></div>
        {% endif %}
    </div>
</div>

<script>
const root = document.documentElement;
function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    const icon = document.getElementById('themeIcon');
    const btn  = document.getElementById('themeToggle');
    icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    btn.title = theme === 'dark' ? 'Switch to Light Mode' : 'Switch to Dark Mode';
    localStorage.setItem('neuroscan-theme', theme);
}
function toggleTheme() { applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
applyTheme(localStorage.getItem('neuroscan-theme') || 'dark');

// Neural particles
const canvas = document.getElementById('particlesCanvas');
const ctx = canvas.getContext('2d');
let W, H, nodes = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();
for (let i = 0; i < 35; i++) nodes.push({ x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-.5)*.4, vy:(Math.random()-.5)*.4, r:Math.random()*2+1, pulse:Math.random()*Math.PI*2 });
function drawP() {
    ctx.clearRect(0,0,W,H);
    const isDark = root.getAttribute('data-theme') !== 'light';
    nodes.forEach(n => {
        n.x+=n.vx; n.y+=n.vy; n.pulse+=0.03;
        if(n.x<0||n.x>W) n.vx*=-1; if(n.y<0||n.y>H) n.vy*=-1;
        nodes.forEach(m => {
            const d = Math.hypot(n.x-m.x, n.y-m.y);
            if(d<120){ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.lineTo(m.x,m.y);ctx.strokeStyle=(isDark?'rgba(0,229,255,':'rgba(0,102,255,')+(0.15*(1-d/120)).toFixed(3)+')';ctx.lineWidth=0.6;ctx.stroke();}
        });
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r*(0.7+0.3*Math.sin(n.pulse)),0,Math.PI*2);
        ctx.fillStyle=isDark?'#00e5ff':'#0066ff'; ctx.globalAlpha=isDark?0.55:0.3; ctx.fill(); ctx.globalAlpha=1;
    });
    requestAnimationFrame(drawP);
}
drawP();

const TOKEN = "{{ token or '' }}";
const colors = ['#ff4757','#ffa502','#eccc68','#2ed573'];
const labels = ['Weak','Fair','Good','Strong'];

function updateStrength(pw) {
    let s = 0;
    if (pw.length >= 6) s++;
    if (pw.length >= 10) s++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
    if (/[0-9]/.test(pw)) s++;
    if (/[^A-Za-z0-9]/.test(pw)) s++;
    s = Math.min(s, 4);
    for (let i = 1; i <= 4; i++) {
        document.getElementById('s'+i).style.background = i <= s ? colors[s-1] : 'rgba(0,229,255,0.1)';
    }
    const lbl = document.getElementById('sLabel');
    lbl.textContent = pw.length > 0 ? (labels[s-1]||'') : '';
    lbl.style.color = pw.length > 0 ? colors[s-1] : 'var(--text-muted)';
}

function togglePw(id, btn) {
    const inp = document.getElementById(id);
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    btn.querySelector('i').className = isText ? 'fas fa-eye' : 'fas fa-eye-slash';
}

async function doReset(e) {
    e.preventDefault();
    const pw = document.getElementById('newPassword').value;
    const cpw = document.getElementById('confirmPassword').value;
    document.getElementById('successMsg').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';
    if (pw.length < 6) { showErr('Password must be at least 6 characters'); return; }
    if (pw !== cpw) { showErr('Passwords do not match'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    document.getElementById('btnLoader').style.display = 'block';
    document.getElementById('btnIcon').style.display = 'none';
    document.getElementById('btnText').textContent = 'Resetting…';

    try {
        const resp = await fetch('/reset-password', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ token: TOKEN, newPassword: pw })
        });
        const data = await resp.json();
        if (resp.ok) {
            document.getElementById('successMsg').style.display = 'flex';
            document.getElementById('resetForm').style.display = 'none';
            setTimeout(() => window.location.href = '/login', 2500);
        } else {
            showErr(data.error || 'Reset failed. Please try again.');
        }
    } catch(err) {
        showErr('Network error. Please try again.');
    } finally {
        btn.disabled = false;
        document.getElementById('btnLoader').style.display = 'none';
        document.getElementById('btnIcon').style.display = 'inline';
        document.getElementById('btnText').textContent = 'Reset Password';
    }
}

function showErr(msg) {
    document.getElementById('errorText').textContent = msg;
    document.getElementById('errorMsg').style.display = 'flex';
}
</script>
</body>
</html>
